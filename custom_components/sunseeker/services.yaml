start_mowing:
  name: Start mowing
  description: >
    Start the mower and optionally specify a list of zones to mow.
    If no zones are provided, the mower will use its default behavior.
  fields:
    entity_id:
      name: Mower entity
      description: The mower entity to control.
      required: true
      selector:
        entity:
          domain: lawn_mower
    zones:
      name: Zones
      description: A list of zone names to mow.
      required: true
      example: ["Front yard", "Back yard"]
      selector:
        object: {}

stop_mowing:
  name: Stop mowing
  description: >
    Stops the mower.
  fields:
    entity_id:
      name: Mower entity
      description: The mower entity to control.
      required: true
      selector:
        entity:
          domain: lawn_mower

start_mowing_selected_area:
  name: Start mowing selected area
  description: >
    Start mowing a manually selected polygon area.
  fields:
    entity_id:
      name: Mower entity
      description: The mower entity to control.
      required: true
      selector:
        entity:
          domain: lawn_mower
    points:
      name: Area points
      description: >
        Polygon points for the selected area in order. Each point must be [x, y].
      required: true
      example: [[-2.815, -3.892], [9.636, -3.892], [9.636, -7.401], [2.215, -7.401]]
      selector:
        object: {}

stop_task:
  name: Stop task
  description: >
    Stop the current mower task.
  fields:
    entity_id:
      name: Mower entity
      description: The mower entity to control.
      required: true
      selector:
        entity:
          domain: lawn_mower

set_pin:
  name: Change pin
  description: >
    Change the mowers 4 digit pin code.
  fields:
    entity_id:
      name: Mower entity
      description: The mower entity.
      required: true
      selector:
        entity:
          domain: lawn_mower
    old_pin:
      name: Old pin code
      description: The mowers old 4 digits pin code.
      required: true
      selector:
        text:
    new_pin:
      name: New pin code
      required: true
      description: The mowers new 4 digits pin code.
      selector:
        text:

set_schedule:
  name: Set schedule
  description: >
    Set the mowing schedule for your Sunseeker mower. You must provide the Schedule sensor entity and a complete schedule object.
    The format differs depending on model type — see the examples below.
  fields:
    entity_id:
      name: Schedule sensor entity
      description: The mower's Schedule sensor entity (the one that has the schedule attribute).
      required: true
      selector:
        entity:
          domain: sensor
    schedule:
      name: Schedule
      description: >
        The schedule data to apply. The format depends on the model type.
        For old wired models include "model_type": "old" and provide one entry per day with enabled, starttime, endtime, and trim fields.
        For wireless models (V/V1/X/S) omit model_type and provide up to two time-slot entries per day plus the top-level mode flags.
      required: true
      example: |
        # Old wired model example:
        {
          "model_type": "old",
          "monday":    { "enabled": true,  "starttime": "08:00", "endtime": "11:00", "trim": false },
          "tuesday":   { "enabled": true,  "starttime": "08:00", "endtime": "11:00", "trim": false },
          "wednesday": { "enabled": false, "starttime": "00:00", "endtime": "00:00", "trim": false },
          "thursday":  { "enabled": true,  "starttime": "08:00", "endtime": "11:00", "trim": false },
          "friday":    { "enabled": true,  "starttime": "08:00", "endtime": "11:00", "trim": false },
          "saturday":  { "enabled": false, "starttime": "00:00", "endtime": "00:00", "trim": false },
          "sunday":    { "enabled": false, "starttime": "00:00", "endtime": "00:00", "trim": false }
        }

        # Wireless model example (V/V1/X/S):
        {
          "recommended_time_work": false,
          "user_defined": true,
          "pause": false,
          "locations": ["Front", "Back"],
          "monday": [
            { "enabled": true,  "starttime": "08:00", "endtime": "10:00", "locations": ["Front"] },
            { "enabled": false, "starttime": "00:00", "endtime": "00:00", "locations": [] }
          ],
          "tuesday":   [],
          "wednesday": [],
          "thursday":  [],
          "friday":    [],
          "saturday":  [],
          "sunday":    []
        }

set_map:
  name: Set map
  description: >
    Set the map data for your Sunseeker mower. You must provide the mower entity and a complete map object.
  fields:
    entity_id:
      name: Image entity with map add to attributes
      description: The mowers Image entity to set the map for.
      required: true
      selector:
        entity:
          domain: image
    schedule:
      name: Map data
      description: >
        The map data to apply. This must be a dictionary matching the expected map format.
      required: true
      example: |
        Use the sunseeker-map-edit-card.

